name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: \${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: \${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 314103481823.dkr.ecr.ap-south-1.amazonaws.com
      
      - name: Show Project Files 
        run: | 
          ls 
          ls backend

      - name: Build Docker image
        run: |
          cd backend
          docker build -t backend-app .

      - name: Tag Image
        run: |
          docker tag backend-app:latest 314103481823.dkr.ecr.ap-south-1.amazonaws.com/backendapp:latest

      - name: Push Image
        run: |
          docker push 314103481823.dkr.ecr.ap-south-1.amazonaws.com/backendapp:latest