name: Deploy Backend

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:

  - name: Checkout Repository
    uses: actions/checkout@v3

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ap-south-1

  - name: Login to Amazon ECR
    run: |
      aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 314103481823.dkr.ecr.ap-south-1.amazonaws.com

  - name: Check Project Files
    run: |
      ls
      ls backend

  - name: Build Docker Image
    run: |
      cd backend
      docker build -t backend-app .

  - name: Tag Docker Image
    run: |
      docker tag backend-app:latest 314103481823.dkr.ecr.ap-south-1.amazonaws.com/backend-app:latest

  - name: Push Docker Image to ECR
    run: |
      docker push 314103481823.dkr.ecr.ap-south-1.amazonaws.com/backend-app:latest
```
