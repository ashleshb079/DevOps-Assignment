name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Files (Debug)
        run: ls -R

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 314103481823.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t backend-app ./backend/Dockerfile

      - name: Tag Image
        run: docker tag backend-app:latest 314103481823.dkr.ecr.ap-south-1.amazonaws.com/backend-app:latest

      - name: Push Image
        run: docker push 314103481823.dkr.ecr.ap-south-1.amazonaws.com/backend-app:latests